<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thành viên nhóm</title>

<style>
body{
    font-family: Arial;
    background:#f2f2f2;
    margin:0;
}

/* HEADER */
header{
    background:linear-gradient(90deg,#0077ff,#00c6ff);
    color:white;
    text-align:center;
    padding:20px;
}

/* BACK BUTTON */
.back{
    margin:20px;
    padding:10px 15px;
    background:#0077ff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

/* MEMBER BOX */
.container{
    width:80%;
    margin:auto;
}
.member{
    background:white;
    margin:15px 0;
    padding:15px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    font-size:18px;
}
.member:hover{
    transform:scale(1.02);
    transition:0.3s;
}
</style>

</head>

<body>

<header>
<h1>Thành viên nhóm</h1>
</header>

<button class="back" onclick="location.href='index.html'">
← Quay về Trang chủ
</button>

<div class="container">

<div class="member">Nguyễn Xuân Giang</div>
<div class="member">Trịnh An Bin</div>
<div class="member">Trương Kiều Linh</div>
<div class="member">Nguyễn Thị Thanh Ngân</div>
<div class="member">Cao Hồng Nhung</div>
<div class="member">Nguyễn Trọng Điểm</div>
<div class="member">Nguyễn Lê Trinh Nữ</div>
<div class="member">Trần Khang</div>
<div class="member">Võ Ngọc Giàu</div>
<div class="member">Hà Thế Danh</div>

</div>

</body>
</html>
