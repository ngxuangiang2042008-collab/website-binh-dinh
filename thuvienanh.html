<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thư viện ảnh Bình Định</title>

<style>
body{
    font-family: Arial;
    background:#f2f2f2;
    margin:0;
}

/* HEADER */
header{
    background:linear-gradient(90deg,#0077ff,#00c6ff);
    color:white;
    text-align:center;
    padding:20px;
}

/* BACK BUTTON */
.back{
    margin:20px;
    padding:10px 15px;
    background:#0077ff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

/* GALLERY */
.gallery{
    width:90%;
    margin:auto;
}
.gallery img{
    width:30%;
    margin:1%;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    transition:0.3s;
    cursor:pointer;
}
.gallery img:hover{
    transform:scale(1.05);
}

/* POPUP IMAGE */
#popup{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
}
#popup img{
    max-width:80%;
    max-height:80%;
    border-radius:10px;
}
</style>

<script>
function showImage(src){
    document.getElementById("popupImg").src = src;
    document.getElementById("popup").style.display = "flex";
}

function closeImage(){
    document.getElementById("popup").style.display = "none";
}
</script>

</head>

<body>

<header>
<h1>Thư viện ảnh Bình Định</h1>
</header>

<button class="back" onclick="location.href='index.html'">
← Quay về Trang chủ
</button>

<div class="gallery">
<img src="images/kyco.jpg" onclick="showImage(this.src)">
<img src="images/culaoxanh.jpg" onclick="showImage(this.src)">
<img src="images/trungluong.jpg" onclick="showImage(this.src)">
<img src="images/eogio.jpg" onclick="showImage(this.src)">
<img src="images/thapbanhit.jpg" onclick="showImage(this.src)">
<img src="images/thapduonglong.jpg" onclick="showImage(this.src)">
<img src="images/muivirong.jpg" onclick="showImage(this.src)">
<img src="images/baotangquangtrung.jpg" onclick="showImage(this.src)">
<img src="images/baitamhoanghau.jpg" onclick="showImage(this.src)">
</div>

<!-- POPUP -->
<div id="popup" onclick="closeImage()">
    <img id="popupImg">
</div>

</body>
</html>
